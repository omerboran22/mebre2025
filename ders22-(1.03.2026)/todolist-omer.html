<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO List</title>
  <style>
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: black;
      color: white;
    }
    .container{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .todolist-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    #taskInput {
      padding: 10px;
      width: 200px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      background-color: white;
      color: black;
      border: none;
      cursor: pointer;
    }
    #taskList {
      list-style-type: none;
      padding: 0;
      margin-top: 10px;
    }
    .task-item {
      background-color: white;
      color: black;
      padding: 10px;
      margin-bottom: 5px;
      width: 200px;
      text-align: left;
    }
    
  </style>
</head>
<body>
  <section class="container">
    <h1>TODO List</h1>
    <div class="todolist-container">
      <input type="text" id="taskInput" placeholder="Enter a task">
      <button onclick="addTask()">Add Task</button>
      <div id="taskList"></div>
    </div>
  </section>

  <script>

    function getLocalStorage(key) {
      const value = localStorage.getItem(key);
      return value ? JSON.parse(value) : null;
    }

    function setLocalStorage(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function removeLocalStorage(key) {
      localStorage.removeItem(key);
    }

    function DeleteButtonComponent(item) {
      const deleteButton = document.createElement('button');
      deleteButton.textContent = 'Delete';
      deleteButton.onclick = handleDeleteButtonClick.bind(null, item);
      return deleteButton;
    }

    function handleDeleteButtonClick(item) {
      const id = item.getAttribute('data-id');
      removeLocalStorage(id);
      item.remove();
    }

    function taskItemComponent(value) {
      const listItem = document.createElement('div');
      
      listItem.className = 'task-item';
      listItem.textContent = value;
      listItem.appendChild(DeleteButtonComponent(listItem));
      return listItem;
    }

    function addTask() {
      const id = 'task-' + Date.now();
      const taskInput = document.getElementById('taskInput');
      const taskList = document.getElementById('taskList');
      
      if (taskInput.value.trim() !== '') {
        const listItem = taskItemComponent(taskInput.value);
        setLocalStorage(id, taskInput.value);
        listItem.setAttribute('data-id', id);
        taskList.appendChild(listItem);
        taskInput.value = '';
      }
    }

    function loadTasks() {
      const taskList = document.getElementById('taskList');
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('task-')) {
          const value = getLocalStorage(key);
          const listItem = taskItemComponent(value);
          listItem.setAttribute('data-id', key);
          taskList.appendChild(listItem);
        }
      }
    }

    document.addEventListener('DOMContentLoaded', loadTasks);

   

  </script>
  
</body>
</html>
