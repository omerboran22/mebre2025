<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bitcount+Prop+Single:wght@100..900&family=Playwrite+NZ+Basic+Guides&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="todolist.css">
  <style>
    body {
      text-align: center;
    }
  </style>
</head>
<body>
  <section class="container">
    <header>
      <h1 style="text-align: center;">TODO List</h1>
      <button class='btn btn-secondary' >Change Theme</button>
    </header>
    <script>
      const themeSelect =[
        'light',
        'dark',
        'solarized',
        'high-contrast',
        'dark-blue',
        'tangerine'
      ]
      let themeIndex = 0;
      const themeButton = document.querySelector('button');
      themeButton.addEventListener('click', () => {
        document.body.className = themeSelect[themeIndex];
        themeIndex = (themeIndex + 1) % themeSelect.length;
      });
    </script>
    <div class="todolist-container">
      <div class="form-group">
        <input class="w-75" type="text" id="taskInput" placeholder="Enter a task">
        <button type="button" class="btn btn-success w-25" id="addTaskButton">
          <i class="fas fa-plus"></i>
          <span>Add</span>
        </button>
      </div>
      <ul id="taskList" class="task-list">
       
      </ul>
    </div>
  </section>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="todolist.js"></script>
</body>
</html>
