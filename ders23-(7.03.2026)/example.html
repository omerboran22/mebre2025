<div class="login-form box">
  <h2>login</h2>
  <input type="text" placeholder="username">
  <div id="passgr">
    <input type="password" placeholder="password">
    <button>
      <span>show/hide password</span>
    </button>
  </div>

  <button>Login</button>

</div>

<script>
  const passwordInput = document.querySelector('.login-form input[type="password"]');
  const toggleButton = document.querySelector('.login-form #passgr button');

  toggleButton.addEventListener('click', () => {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleButton.textContent = 'hide password';
    } else {
      passwordInput.type = 'password';
      toggleButton.textContent = 'show password';
    }
  });

</script>


<div class="box">

  <button onclick="increment(this,event)">
    sayi azalt
  </button>
  <span id="counter">
    0
  </span>
  <button id="incrementButton">
    sayi arttır
  </button>

  <script>
    let counter = 0;
    const counterSpan = document.getElementById('counter');

    const buton=document.querySelector('#incrementButton')
    buton.addEventListener('click', increment)

    function increment(eventelement,event) {
      const element = event.target;
      element.style.backgroundColor = 'yellow';
      counter += 1;
      counterSpan.textContent = counter;
    }

  </script>

</div>
