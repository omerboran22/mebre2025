<!DOCTYPE html>
<html lang="en">
<body>

    <script>
      function bölünme(sayi) {
        if (sayi % 3 == 0 && sayi % 5 == 0) {
          return "FizzBuzz";
        } else if (sayi % 3 == 0) {
          return "Fizz";
        } else if (sayi % 5 == 0) {
          return "Buzz";
        } else {
          return "Bölünmüyor";
        }
      }

      for (let i = 1; i <= 20; i++) {
        let sonuc = bölünme(i);
        console.log(`bölünme(${i}) = ${sonuc}`);
      }


    </script>


</body>
</html>
