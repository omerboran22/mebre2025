    // (Örn: 5! = 5 * 4 * 3 * 2 * 1 = 120)
    function faktoriyelHesapla(num) {
      if (isNaN(num)) {
        return 'not a number'
      }

      if (num<=0) {
        return 'number is must be positive'
      }
      let ftson=1;
      for (let i = 1; i <= num; i++) {
        ftson *=i
        console.log(`Number: ${i}, ciyle sonuc: ${ftson}`)
      }
