<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallBack Nedir</title>
</head>
<body>

  <table border="1">
    <tr>
      <th>Id</th>
      <th>Title</th>
      <th>Body</th>
    </tr>
    <tbody id="data-table-body">
      <td colspan="3">
        <p>Veriler yükleniyor...</p>
      </td>
    </tbody>
  </table>

  <div>
      <h1>CallBack Nedir</h1>
      <p>Bu dersimizde callback fonksiyonlarının ne olduğunu ve nasıl kullanıldığını öğreneceğiz.</p>
  </div>
  
  <script>
    function fetchData(callback) {
      fetch("https://jsonplaceholder.typicode.com/posts")
        .then(response => response.json())
        .then(data => {
          new Promise((resolve, reject) => {
            setTimeout(() => {
              resolve(data);
            },2000); // 2 saniye gecikme
          }).then(callback);
        })
        .catch(error => {
          console.error("Hata:", error);
        });
    }

    function displayData(data) {
      const tableBody = document.getElementById("data-table-body");
      tableBody.innerHTML = ""; // Önceki içeriği temizle
      data.forEach(item => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.id}</td>
          <td>${item.title}</td>
          <td>${item.body}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    // CallBack fonksiyonunu kullanarak veri çekme
    fetchData(displayData);
  </script>
  
</body>
</html>
