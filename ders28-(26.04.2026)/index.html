    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        html{
          scroll-behavior: smooth;
        }
        body {
            min-height: max(884px, 100dvh);

        }
    </style>
</head>

<body class="bg-background text-on-background antialiased">
    <!-- TopAppBar -->
    <header
        class="bg-stone-50/90 dark:bg-stone-950/90 backdrop-blur-md fixed top-0 w-full z-50 border-b border-stone-200/50 dark:border-stone-800/50 shadow-sm shadow-stone-200/20 dark:shadow-none">
        <div class="flex justify-between items-center px-6 py-4 max-w-screen-2xl mx-auto">
            <div
                class="font-serif text-xl font-bold text-[#3C2A21] dark:text-stone-100 font-headline-md text-headline-md">
                BI Borek Cafe
            </div>
        </div>
    </header>
    <!-- Main Content -->
    <main class="pt-24 pb-24 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
        <!-- Mobile Search (Visible only on small screens) -->
        <div class="mb-6 relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50"
                data-icon="search">search</span>
            <input
                class="w-full bg-surface-container-low border border-outline-variant rounded-full py-3 pl-10 pr-4 text-body-md font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors"
                placeholder="Ara" type="text" />
        </div>
        <!-- Category Menu (Horizontal Scroll) -->
        <nav class="mb-section-padding -mx-margin-mobile px-margin-mobile md:mx-0 md:px-0 overflow-x-auto no-scrollbar">
            <div class="flex gap-4 min-w-max pb-2" id="category-menu">
            </div>
        </nav>

        <div id="products"></div>
    </main>

    

    <script>
      const productsData = {
        "Poğaçalar": [
          {
            name: "Kaşarlı Poğaça",
            price: "15.00 ₺",
            description: "Fırından yeni çıkmış, sıcacık ve uzayan kaşar peyniri dolgulu yumuşak poğaça.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Kasarli+Pogaca"
          },
          {
            name: "Zeytinli Poğaça",
            price: "15.00 ₺",
            description: "Özenle seçilmiş siyah zeytin ezmesiyle hazırlanan, ağızda dağılan klasik lezzet.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Zeytinli+Pogaca"
          },
          {
            name: "Kıymalı Karaköy Poğaçası",
            price: "22.00 ₺",
            description: "Bol tereyağlı, çıtır çıtır hamuru ve nefis kıymalı iç harcıyla meşhur Karaköy poğaçası.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Kiymali+Pogaca"
          },
          {
            name: "Dereotlu Peynirli Poğaça",
            price: "18.00 ₺",
            description: "Taze dereotu ve beyaz peynirin mükemmel uyumuyla hazırlanan, kıyır kıyır poğaça.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Dereotlu+Pogaca"
          }
        ],
        "Börekler": [
          {
            name: "Peynirli Su Böreği (Porsiyon)",
            price: "60.00 ₺",
            description: "İncecik açılmış yufkası, bol beyaz peyniri ve maydanozuyla geleneksel su böreği.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Su+Boregi"
          },
          {
            name: "Kıymalı Kol Böreği (Porsiyon)",
            price: "70.00 ₺",
            description: "Çıtır hamuru ve baharatlı bol kıymalı harcıyla fırından taze çıkan kol böreği.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Kol+Boregi"
          },
          {
            name: "Patatesli Gül Böreği",
            price: "25.00 ₺",
            description: "Yumuşacık iç harcı ve çıtır dış yüzeyiyle, doyurucu patatesli gül böreği.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Gul+Boregi"
          }
        ],
        "Pideler ve Açmalar": [
          {
            name: "Sade Açma",
            price: "18.00 ₺",
            description: "Tereyağlı, tel tel ayrılan, çayın yanına en iyi giden yumuşacık klasik açma.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Sade+Acma"
          },
          {
            name: "Zeytinli Açma",
            price: "22.00 ₺",
            description: "İçerisi dilim siyah zeytinlerle zenginleştirilmiş, fırından taze çıkan lezzet.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Zeytinli+Acma"
          },
          {
            name: "Kır Pidesi (Peynirli)",
            price: "35.00 ₺",
            description: "Özel hamuru ve lor peyniri harcıyla hazırlanan, doyurucu sıcak kır pidesi.",
            image: "https://placehold.co/200x200/eeeeee/333333?text=Kir+Pidesi"
          }
        ]
      };

      function LoadCategoryMenu() {
        const categoryMenu = document.getElementById("category-menu");
        const categories = Object.keys(productsData);

        categories.forEach(category => {
          const link = document.createElement("a");
          link.className = "bg-transparent text-on-surface-variant px-6 py-2 rounded-full font-label-sm text-label-sm hover:bg-surface-container transition-colors border border-outline-variant";
          link.textContent = category;
          link.href = `#${category.toLowerCase().replace(/\s+/g, '-')}`; 
          categoryMenu.appendChild(link);
        });
      }

      function productByCategoryList(category) {
        return category.map(product => {
            return `
             <div
               class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_4px_24px_rgba(60,42,33,0.04)] group transition-transform duration-300 hover:-translate-y-1">
               <div class="aspect-[4/3] bg-surface-container relative overflow-hidden">
                   <img alt="${product.name}"
                       class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500"
                       data-alt="${product.description}"
                       src="${product.image}" />
               </div>
               <div class="p-6">
                   <div class="flex justify-between items-start mb-2">
                       <h3
                           class="font-headline-md text-headline-md text-primary group-hover:text-secondary transition-colors">
                           ${product.name}</h3>
                       <span
                           class="font-label-sm text-label-sm text-secondary bg-secondary-container/20 px-3 py-1 rounded-full">${product.price}</span>
                   </div>
                   <p class="font-body-md text-body-md text-on-surface-variant mb-6 line-clamp-2">${product.description}</p>
                   <button
                       class="w-full bg-surface-container-high hover:bg-primary-container hover:text-on-primary-container text-primary py-3 rounded-lg font-label-sm text-label-sm transition-colors flex items-center justify-center gap-2">
                       <span class="material-symbols-outlined text-[20px]" data-icon="add">add</span> Add to Order
                   </button>
               </div>
           </div>
            `
        })
       }

       function ProductCardList() {
        const productsContainer = document.getElementById("products");
        productsContainer.innerHTML = ""; // Clear previous products
          for (const category in productsData) {
            const section = document.createElement("section");
            section.className = "mb-section-padding";
            section.id = category.toLowerCase().replace(/\s+/g, '-'); // Set ID for anchor linking

            const heading = document.createElement("h2");
            heading.className = "font-headline-lg text-headline-lg text-primary mb-8 border-b border-outline-variant/30 pb-4";
            heading.textContent = category;
            section.appendChild(heading);

            const grid = document.createElement("div");
            grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter";
            grid.innerHTML = productByCategoryList(productsData[category]).join("");
            section.appendChild(grid);
            productsContainer.appendChild(section);
          }
       }

      document.addEventListener("DOMContentLoaded", function () {
        LoadCategoryMenu();
        ProductCardList();
      });
    </script>
</body>

</html>
