  <style>
    html{
      background: black;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4);
    }

    .sky-bg {
      background: linear-gradient(135deg, #00a3ff 0%, #cfe5ff 100%);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

  <title>Hava Durumu Lokasyon Bazli</title>
</head>

<body>

  <main
    class="relative pt-32 pb-40 px-margin-mobile md:px-margin-desktop min-h-screen flex items-center justify-center">
    <!-- Main Weather Canvas -->
    <div class="w-full max-w-4xl relative z-10">
      <!-- Hero Weather Card -->
      <section class="glass-card rounded-[2rem] p-8 md:p-12 mb-base">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
          <!-- Location & Temp -->
          <div class="space-y-2">
            <div class="flex items-center gap-2 text-white/90">
              <span class="material-symbols-outlined text-[20px]" data-icon="location_on">location_on</span>
              <span class="font-headline-md text-headline-md tracking-tight" id="location-country">Istanbul</span>
            </div>
            <div class="flex items-baseline gap-1">
              <span class="font-display-xl text-display-xl text-white" id="temperature"></span>
              <span class="font-headline-lg text-headline-lg text-white/70">C</span>
            </div>
            <p class="font-label-lg text-label-lg text-white/80 uppercase tracking-widest" id="weather-description">Partly Cloudy</p>
          </div>
          <!-- Weather Icon -->
          <div class="relative group">
            <div class="absolute inset-0 bg-primary-container/30 blur-3xl rounded-full scale-150 opacity-50">
            </div>
            <span
              class="material-symbols-outlined text-[120px] md:text-[160px] text-white relative z-10 drop-shadow-2xl"
              data-icon="partly_cloudy_day" data-weight="fill"
              style="font-variation-settings: 'FILL' 1;">partly_cloudy_day</span>
          </div>
        </div>
        <!-- Hourly Forecast Divider -->
        <div class="mt-12 mb-6 flex items-center justify-between">
          <h2 class="font-label-lg text-label-lg text-white uppercase tracking-widest">Hourly Forecast</h2>
          <span class="h-px flex-1 bg-white/20 mx-6"></span>
          <span class="material-symbols-outlined text-white/60" data-icon="schedule">schedule</span>
        </div>
        <!-- Hourly List -->
        <div class="flex gap-4 overflow-x-auto pb-4 hide-scrollbar -mx-2 px-2 " id="hourly-forecast">
        
        </div>
      </section>
      <!-- Bottom Data Tiles -->
      <section class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
        <div class="glass-card rounded-3xl p-6 flex flex-col gap-1">
          <span class="font-label-sm text-label-sm text-white/60 uppercase tracking-wider">Latitude</span>
          <span class="font-headline-md text-headline-md text-white" id="latitude"></span>
        </div>
        <div class="glass-card rounded-3xl p-6 flex flex-col gap-1">
          <span class="font-label-sm text-label-sm text-white/60 uppercase tracking-wider">Longitude</span>
          <span class="font-headline-md text-headline-md text-white" id="longitude"></span>
        </div>
        <div class="glass-card rounded-3xl p-6 flex flex-col gap-1">
          <span class="font-label-sm text-label-sm text-white/60 uppercase tracking-wider">Elevation</span>
          <span class="font-headline-md text-headline-md text-white" id="elevation"></span>
        </div>
      </section>
    </div>
    <!-- Decorative Environmental Background Element -->
    <div
      class="fixed top-[20%] right-[-10%] w-[600px] h-[600px] bg-white/10 blur-[120px] rounded-full pointer-events-none">
    </div>
    <div
      class="fixed bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary-container/20 blur-[100px] rounded-full pointer-events-none">
    </div>
  </main>

  <script>
    const API_URL = new URL("https://api.open-meteo.com/v1/forecast?hourly=temperature_2m");
    async function getCordinants() {
      return new Promise((resolve, reject) => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function(position) {
            resolve(position);
          }, function(error) {
            reject(error);
          });
        } else {
          reject(new Error("Geolocation is not supported by this browser."));
        }
      })
    }
    async function getAddressWithCord(lat,long) {
      const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${long}`);
      const data = await response.json();
      return data;
      
    }

    async function getWeather() {
      let lat, long;
      await getCordinants().then(position => {
        lat = position.coords.latitude;
        long = position.coords.longitude;
        console.log("Latitude: " + lat + ", Longitude: " + long);
      }).catch(error => {
        console.error("Error getting location:", error);
      });
      API_URL.searchParams.append("latitude", lat);
      API_URL.searchParams.append("longitude", long);
      API_URL.searchParams.append("forecast_days", 1);
      const response = await fetch(API_URL);
      const data = await response.json();
      updateWeatherUI(data)
    }

    function updateWeatherUI(weatherData) {
      const locationElement = document.getElementById("location-country");
      const temperatureElement = document.getElementById("temperature");
      const weatherDescriptionElement = document.getElementById("weather-description");
      const hourlyForecastContainer = document.getElementById("hourly-forecast");
      const latitudeElement = document.getElementById("latitude");
      const longitudeElement = document.getElementById("longitude");
      const elevationElement = document.getElementById("elevation");

      // Update location (using latitude and longitude as a placeholder)
      const addressPromise = getAddressWithCord(weatherData.latitude, weatherData.longitude);
      addressPromise.then(addressData => {
        console.log("Address Data:", addressData);
        if (addressData && addressData.address) {
          const city = addressData.name || addressData.address.city || addressData.address.town || addressData.address.village || "Unknown Location";
          locationElement.textContent = city;
        } else {
          locationElement.textContent = "Unknown Location";
        }
      }).catch(error => {
        console.error("Error fetching address:", error);
        locationElement.textContent = "Unknown Location";
      });

      // Update current temperature (using the first hourly data point as a placeholder)
      if (weatherData.hourly && weatherData.hourly.temperature_2m && weatherData.hourly.temperature_2m.length > 0) {
        temperatureElement.textContent = `${weatherData.hourly.temperature_2m[0].toFixed(1)}°`;
        weatherDescriptionElement.textContent = "Current Weather"; // Placeholder description
      }

      // Update hourly forecast
      if (weatherData.hourly && weatherData.hourly.time && weatherData.hourly.temperature_2m) {
        hourlyForecastContainer.innerHTML = ""; // Clear existing forecast
        for (let i = 0; i < weatherData.hourly.time.length; i++) {
          const time = new Date(weatherData.hourly.time[i]);
          const temp = weatherData.hourly.temperature_2m[i];
          const hourBlock = document.createElement("div");
          hourBlock.className = "flex flex-col items-center gap-3 glass-card bg-white/40 border-none rounded-2xl p-4 min-w-[80px]";
          hourBlock.innerHTML = `
            <span class="font-label-sm text-label-sm text-white">${time.getHours()}:00</span>
            <span class="material-symbols-outlined text-white" data-icon="wb_sunny">wb_sunny</span>
            <span class="font-label-lg text-label-lg text-white">${temp.toFixed(1)}°</span>
          `;
          hourlyForecastContainer.appendChild(hourBlock);
        }
      }

      // Update latitude, longitude, and elevation
      latitudeElement.textContent = weatherData.latitude.toFixed(2);
      longitudeElement.textContent = weatherData.longitude.toFixed(2);
      elevationElement.textContent = `${weatherData.elevation} m`;
    }




    document.addEventListener("DOMContentLoaded", function() {
      getWeather();
    });
  </script>
